experiment: algonauts_current_neurotwin_debug
run_id: algonauts_current_neurotwin_debug
description: Current NeuroTwin translator debug baseline for prepared Algonauts/CNeuroMod fMRI windows.
dataset: prepared_manifest
task: neural_translation_v1
split: stimulus_run_group
data:
  event_manifest: /path/to/algonauts_prepared/event_manifest.json
  split_manifest: /path/to/algonauts_prepared/split_manifest.json
seed: 0
steps: 2000
batch_size: 32
window_size: 128
stride: 64
precision: bf16
bf16: true
gradient_accumulation_steps: 2
max_grad_norm: 1.0
checkpoint_every_steps: 200
eval_every_steps: 200
require_real_stimulus: true
evidence_gate:
  require_real_stimulus: true
  require_source_artifact_hash: true
  require_structured_baseline_suite: true
  require_paper_mode_gate: true
  allow_transcript_hash_claims: false
stimulus:
  require_real_stimulus: true
  forbid_sources:
    - transcript_hash
    - synthetic
    - self_attested_embedding
model:
  type: NeuralStateSpaceTranslator
  input_dim: 1000
  output_dim: 1000
  latent_dim: 256
  n_layers: 4
  backbone: ssm_fallback
  encoder: temporal_conv
  n_heads: 8
  projection_dim: 128
  use_pair_state: false
  use_uncertainty_head: false
  refinement_steps: 0
  modalities:
    - fmri
    - stimulus
training:
  compile: false
  internet_required: false
  objective_weights:
    future_state_forecasting: 1.0
    masked_neural_reconstruction: 1.0
    stimulus_to_fmri_response: 1.0
