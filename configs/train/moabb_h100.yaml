experiment: moabb_h100
description: H100-scale MOABB/EEG neural translation run from prepared manifests.
dataset: moabb
task: neural_translation_v1
split: subject
seed: 0
batch_size: 256
window_size: 128
stride: 128
precision: bf16
gradient_accumulation_steps: 4
checkpoint_every_steps: 1000
eval_every_steps: 1000
model:
  type: NeuralStateSpaceTranslator
  latent_dim: 512
  n_layers: 12
  backbone: ssm_fallback
  encoder: auto
  n_heads: 8
  subject_adapter_dim: 64
  adapter_mode: disabled
  use_subject_embeddings: false
  modalities:
    - eeg
training:
  ddp: true
  torchrun: true
  compile: false
  objective_weights:
    future_state_forecasting: 1.0
    masked_neural_reconstruction: 1.0
  adapter_mode: disabled
  internet_required: false
