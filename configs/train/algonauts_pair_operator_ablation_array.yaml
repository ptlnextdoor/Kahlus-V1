experiment: algonauts_pair_operator_ablation_array
run_id: algonauts_pair_operator_ablation_array
description: Template for 1-GPU Pair-Operator ablation jobs; materialize one job per ablation variant.
dataset: prepared_manifest
task: neural_translation_v1
split: stimulus_run_group
data:
  event_manifest: /path/to/algonauts_prepared/event_manifest.json
  split_manifest: /path/to/algonauts_prepared/split_manifest.json
seed: 0
steps: 10000
batch_size: 32
window_size: 128
stride: 64
precision: bf16
bf16: true
gradient_accumulation_steps: 2
max_grad_norm: 1.0
checkpoint_every_steps: 500
eval_every_steps: 500
require_real_stimulus: true
evidence_gate:
  require_real_stimulus: true
  require_source_artifact_hash: true
  require_structured_baseline_suite: true
  require_paper_mode_gate: true
  allow_transcript_hash_claims: false
stimulus:
  require_real_stimulus: true
  forbid_sources:
    - transcript_hash
    - synthetic
    - self_attested_embedding
ablation_variants:
  - name: current_neurotwin
    model:
      type: NeuralStateSpaceTranslator
      backbone: ssm_fallback
      use_pair_state: false
      use_uncertainty_head: false
      refinement_steps: 0
  - name: pair_operator_no_pair_state
    model:
      type: NeuroTwinPairOperator
      use_pair_state: false
      use_uncertainty_head: true
      refinement_steps: 1
  - name: pair_operator_low_rank_pair_state
    model:
      type: NeuroTwinPairOperator
      use_pair_state: true
      pair_rank: 16
      pair_top_k: 128
      network_blocks: 7
      use_uncertainty_head: false
      refinement_steps: 0
  - name: pair_operator_pair_state_stimulus_adapter
    model:
      type: NeuroTwinPairOperator
      use_pair_state: true
      pair_rank: 16
      pair_top_k: 128
      network_blocks: 7
      use_uncertainty_head: false
      refinement_steps: 1
  - name: pair_operator_pair_state_uncertainty
    model:
      type: NeuroTwinPairOperator
      use_pair_state: true
      pair_rank: 16
      pair_top_k: 128
      network_blocks: 7
      use_uncertainty_head: true
      use_pair_uncertainty: true
      refinement_steps: 0
  - name: pair_operator_full
    model:
      type: NeuroTwinPairOperator
      use_pair_state: true
      pair_rank: 16
      pair_top_k: 128
      network_blocks: 7
      use_uncertainty_head: true
      use_pair_uncertainty: true
      refinement_steps: 1
model:
  type: NeuroTwinPairOperator
  input_dim: 1000
  output_dim: 1000
  latent_dim: 256
  n_layers: 4
  backbone: gru
  n_heads: 8
  projection_dim: 128
  pair_rank: 16
  pair_top_k: 128
  network_blocks: 7
  pair_confidence_max_parcels: 256
  use_pair_state: true
  use_uncertainty_head: true
  use_pair_uncertainty: true
  refinement_steps: 1
  hrf_delay_steps: 1
  modalities:
    - fmri
    - stimulus
training:
  compile: false
  internet_required: false
  objective_weights:
    future_state_forecasting: 1.0
    masked_neural_reconstruction: 1.0
    stimulus_to_fmri_response: 1.0
