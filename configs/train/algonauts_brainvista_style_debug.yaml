experiment: algonauts_brainvista_style_debug
run_id: algonauts_brainvista_style_debug
description: Local BrainVista-style approximation debug lane; causal fMRI history plus lagged stimulus, not exact BrainVista.
dataset: prepared_manifest
task: stimulus_to_fmri_response
split: stimulus_run_group
baseline_model: brainvista_style
baseline_status: local_approximation
data:
  event_manifest: /path/to/algonauts_prepared/event_manifest.json
  split_manifest: /path/to/algonauts_prepared/split_manifest.json
seed: 0
steps: 2000
batch_size: 32
window_size: 128
stride: 64
precision: bf16
bf16: true
gradient_accumulation_steps: 2
max_grad_norm: 1.0
checkpoint_every_steps: 200
eval_every_steps: 200
require_real_stimulus: true
evidence_gate:
  require_real_stimulus: true
  require_source_artifact_hash: true
  require_structured_baseline_suite: true
  require_paper_mode_gate: true
  allow_transcript_hash_claims: false
stimulus:
  require_real_stimulus: true
  include_current_stimulus: false
  stimulus_lag_steps: 1
  hrf_lag_steps: 2
  forbid_sources:
    - transcript_hash
    - synthetic
    - self_attested_embedding
model:
  type: NeuralStateSpaceTranslator
  input_dim: 1000
  output_dim: 1000
  latent_dim: 256
  n_layers: 4
  backbone: ssm_fallback
  encoder: temporal_conv
  n_heads: 8
  projection_dim: 128
  use_pair_state: false
  use_uncertainty_head: false
  refinement_steps: 0
  modalities:
    - fmri
    - stimulus
training:
  compile: false
  internet_required: false
  objective_weights:
    stimulus_to_fmri_response: 1.0
