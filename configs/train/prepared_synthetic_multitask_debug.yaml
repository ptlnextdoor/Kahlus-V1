experiment: prepared_synthetic_multitask_debug
description: CPU debug multi-task training over prepared synthetic NeuralEventBatch artifacts. Plumbing only, not science.
dataset: prepared_manifest
event_manifest: /tmp/neurotwin_prepared/event_manifest.json
split_manifest: /tmp/neurotwin_prepared/split_manifest.json
task: neural_translation_v1
split: subject
seed: 0
steps: 2
batch_size: 8
gradient_accumulation_steps: 1
window_size: 8
stride: 8
precision: fp32
model:
  type: NeuralStateSpaceTranslator
  latent_dim: 32
  n_layers: 1
  backbone: ssm_fallback
  encoder: auto
  subject_adapter_dim: 8
  adapter_mode: disabled
  projection_dim: 16
  modalities:
    - eeg
    - fmri
training:
  dry_run_ok: true
  internet_required: false
  eval_every_steps: 1
  checkpoint_every_steps: 1
  gradient_checkpointing: false
  compile: false
