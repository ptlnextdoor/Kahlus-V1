experiment: moabb_a100_smoke
description: Tiny controlled A100 MOABB infrastructure smoke run from prepared manifests.
dataset: moabb
task: neural_translation_v1
split: subject
data:
  event_manifest: /path/to/moabb_prepared/event_manifest.json
  split_manifest: /path/to/moabb_prepared/split_manifest.json
seed: 0
steps: 50
batch_size: 128
window_size: 128
stride: 128
precision: bf16
gradient_accumulation_steps: 4
checkpoint_every_steps: 25
eval_every_steps: 25
model:
  type: NeuralStateSpaceTranslator
  latent_dim: 384
  n_layers: 12
  backbone: ssm_fallback
  encoder: auto
  n_heads: 8
  subject_adapter_dim: 48
  adapter_mode: disabled
  use_subject_embeddings: false
  modalities:
    - eeg
training:
  ddp: true
  torchrun: true
  compile: false
  objective_weights:
    future_state_forecasting: 1.0
    masked_neural_reconstruction: 1.0
  adapter_mode: disabled
  internet_required: false
