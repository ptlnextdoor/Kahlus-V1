experiment: moabb_field_compiler_debug
run_id: moabb_field_compiler_debug
description: Debug-only NeuroTwin NFC EEG prepared-manifest run; no real EEG-fMRI translation claim.
dataset: prepared_manifest
task: masked_neural_reconstruction
split: subject
data:
  event_manifest: /path/to/moabb_prepared/event_manifest.json
  split_manifest: /path/to/moabb_prepared/split_manifest.json
seed: 0
steps: 100
batch_size: 8
window_size: 128
stride: 128
precision: fp32
gradient_accumulation_steps: 1
max_grad_norm: 1.0
checkpoint_every_steps: 25
eval_every_steps: 25
require_real_stimulus: false
model:
  type: neurotwin_nfc
  latent_dim: 64
  n_layers: 1
  backbone: gru
  projection_dim: 32
  pair_rank: 4
  use_pair_kernel: true
  use_observation_operator: true
  use_uncertainty: true
  stimulus_lag_steps: 0
  hrf_delay_steps: 0
  modalities:
    - eeg
training:
  compile: false
  internet_required: false
  max_grad_norm: 1.0
  objective_weights:
    masked_neural_reconstruction: 1.0
evidence_gate:
  synthetic_only: false
  require_real_stimulus: false
  scientific_claim_allowed: false
  require_leakage_audit: true
  require_baseline_ranking: true
