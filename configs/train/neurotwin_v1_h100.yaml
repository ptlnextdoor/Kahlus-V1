experiment: neurotwin_v1_h100
description: Full NeuroTwin v1 H100 config for prepared manifests only.
dataset: prepared_manifest
task: neural_translation_v1
split: subject_site_dataset
data:
  event_manifest: /path/to/prepared/event_manifest.json
  split_manifest: /path/to/prepared/split_manifest.json
seed: 0
steps: 100000
batch_size: 512
window_size: 1024
stride: 512
precision: bf16
gradient_accumulation_steps: 8
gradient_checkpointing: true
checkpoint_every_steps: 1000
eval_every_steps: 1000
model:
  type: NeuralStateSpaceTranslator
  latent_dim: 768
  n_layers: 24
  backbone: ssm_fallback
  subject_adapter_dim: 96
  projection_dim: 256
  modalities:
    - eeg
    - meg
    - fmri
    - spikes
training:
  ddp: true
  torchrun: true
  fsdp: optional
  compile: false
  internet_required: false
