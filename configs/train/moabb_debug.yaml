experiment: moabb_debug
description: Optional MOABB EEG debug run. Requires prepared/downloaded MOABB data outside training job.
dataset: moabb
task: masked_neural_reconstruction
split: subject
seed: 0
batch_size: 8
window_size: 256
max_batches: 2
precision: fp32
model:
  type: NeuralStateSpaceTranslator
  latent_dim: 64
  n_layers: 2
  backbone: ssm_fallback
  encoder: auto
  adapter_mode: disabled
  modalities:
    - eeg
training:
  dry_run_ok: true
  internet_required: false
  eval_every_steps: 10
  checkpoint_every_steps: 50
  gradient_checkpointing: false
  compile: false
