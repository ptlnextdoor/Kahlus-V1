experiment: bids_debug
description: BIDS/OpenNeuro manifest debug run. Scans metadata only; no heavy neuroimaging preprocessing.
dataset: bids
task: future_state_forecasting
split: subject
seed: 0
batch_size: 2
window_size: 64
precision: fp32
model:
  type: NeuralStateSpaceTranslator
  latent_dim: 64
  n_layers: 2
  backbone: transformer
  encoder: linear
  n_heads: 4
  adapter_mode: disabled
  modalities:
    - fmri
training:
  dry_run_ok: true
  internet_required: false
  eval_every_steps: 10
  checkpoint_every_steps: 50
  gradient_checkpointing: false
  compile: false
