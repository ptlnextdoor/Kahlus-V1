name: Build A100 Runtime Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::7}"
          image="ghcr.io/${repo}-a100-runtime"
          {
            echo "name=$image"
            echo "short_sha=$short_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.a100.runtime
          platforms: linux/amd64
          push: true
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.short_sha }}
            ${{ steps.image.outputs.name }}:nfc-a100

      - name: Write image reference
        shell: bash
        run: |
          set -euo pipefail
          image_ref="${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}"
          printf '%s\n' "$image_ref" > neurotwin-a100-runtime-image-ref.txt
          printf 'image_ref=%s\n' "$image_ref" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload image reference artifact
        uses: actions/upload-artifact@v4
        with:
          name: neurotwin-a100-runtime-image-ref
          path: neurotwin-a100-runtime-image-ref.txt
